<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bay Area Tech Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; display: flex; height: 100vh; }

    /* Sidebar */
    #sidebar {
      width: 360px;
      min-width: 360px;
      background: #fff;
      border-right: 1px solid #e0e0e0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #sidebar-header {
      padding: 20px;
      background: linear-gradient(135deg, #ff6600, #ff8533);
      color: #fff;
    }
    #sidebar-header h1 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    #sidebar-header p {
      font-size: 13px;
      opacity: 0.9;
    }
    #search-box {
      padding: 12px 16px;
      border-bottom: 1px solid #e0e0e0;
    }
    #search-input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    #search-input:focus { border-color: #ff6600; }
    #filter-bar {
      padding: 8px 16px;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 4px 10px;
      border: 1px solid #ddd;
      border-radius: 12px;
      background: #fff;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover { border-color: #ff6600; color: #ff6600; }
    .filter-btn.active { background: #ff6600; color: #fff; border-color: #ff6600; }
    #company-count {
      padding: 8px 16px;
      font-size: 12px;
      color: #888;
      border-bottom: 1px solid #f0f0f0;
    }
    #company-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    .company-item {
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 1px solid #f5f5f5;
      transition: background 0.15s;
    }
    .company-item:hover { background: #fff5ee; }
    .company-item.active { background: #fff0e0; border-left: 3px solid #ff6600; }
    .company-name {
      font-weight: 600;
      font-size: 14px;
      color: #333;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .company-batch {
      font-size: 11px;
      padding: 1px 6px;
      border-radius: 4px;
      font-weight: 500;
    }
    .company-desc {
      font-size: 12px;
      color: #777;
      margin-top: 4px;
      line-height: 1.4;
    }
    .company-address {
      font-size: 11px;
      color: #999;
      margin-top: 3px;
    }

    /* Map */
    #map { flex: 1; position: relative; }

    /* Legend */
    .map-legend {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(6px);
      border-radius: 8px;
      padding: 12px 14px;
      z-index: 1000;
      font-size: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      line-height: 1.8;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* Category colors */
    .cat-fintech { background: #e3f2fd; color: #1565c0; }
    .cat-saas { background: #e8f5e9; color: #2e7d32; }
    .cat-consumer { background: #fce4ec; color: #c62828; }
    .cat-ai { background: #f3e5f5; color: #6a1b9a; }
    .cat-dev-tools { background: #fff3e0; color: #e65100; }
    .cat-logistics { background: #e0f7fa; color: #00695c; }
    .cat-hr { background: #fff8e1; color: #f57f17; }
    .cat-design { background: #fce4ec; color: #ad1457; }
    .cat-data { background: #e8eaf6; color: #283593; }
    .cat-auto { background: #e0f2f1; color: #00695c; }
    .cat-health { background: #e8f5e9; color: #1b5e20; }
    .cat-security { background: #eceff1; color: #37474f; }
    .cat-commerce { background: #fff3e0; color: #bf360c; }
    .cat-education { background: #e0f7fa; color: #006064; }
    .cat-real-estate { background: #efebe9; color: #4e342e; }

    /* Responsive */
    @media (max-width: 768px) {
      body { flex-direction: column; }
      #sidebar { width: 100%; min-width: unset; height: 45vh; }
      #map { height: 55vh; }
    }
  </style>
</head>
<body>
  <div id="sidebar">
    <div id="sidebar-header">
      <h1>Bay Area Tech Map</h1>
      <p>SF & Bay Area Tech Companies</p>
    </div>
    <div id="search-box">
      <input type="text" id="search-input" placeholder="Search companies...">
    </div>
    <div id="filter-bar">
      <button class="filter-btn active" data-category="all">All</button>
      <button class="filter-btn" data-category="fintech">Fintech</button>
      <button class="filter-btn" data-category="saas">SaaS</button>
      <button class="filter-btn" data-category="ai">AI</button>
      <button class="filter-btn" data-category="dev-tools">Dev Tools</button>
      <button class="filter-btn" data-category="consumer">Consumer</button>
      <button class="filter-btn" data-category="logistics">Logistics</button>
      <button class="filter-btn" data-category="commerce">Commerce</button>
      <button class="filter-btn" data-category="health">Health</button>
      <button class="filter-btn" data-category="education">Education</button>
      <button class="filter-btn" data-category="hr">HR</button>
      <button class="filter-btn" data-category="security">Security</button>
      <button class="filter-btn" data-category="hardware">Hardware</button>
    </div>
    <div id="company-count"></div>
    <div id="company-list"></div>
  </div>
  <div id="map">
    <div class="map-legend">
      <div class="legend-item"><div class="legend-dot" style="background:#c62828"></div> Consumer</div>
      <div class="legend-item"><div class="legend-dot" style="background:#1565c0"></div> Fintech</div>
      <div class="legend-item"><div class="legend-dot" style="background:#6a1b9a"></div> AI</div>
      <div class="legend-item"><div class="legend-dot" style="background:#2e7d32"></div> SaaS</div>
      <div class="legend-item"><div class="legend-dot" style="background:#e65100"></div> Dev Tools</div>
      <div class="legend-item"><div class="legend-dot" style="background:#00695c"></div> Logistics</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ad1457"></div> Commerce</div>
      <div class="legend-item"><div class="legend-dot" style="background:#1b5e20"></div> Health</div>
      <div class="legend-item"><div class="legend-dot" style="background:#006064"></div> Education</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f57f17"></div> HR</div>
      <div class="legend-item"><div class="legend-dot" style="background:#37474f"></div> Security</div>
      <div class="legend-item"><div class="legend-dot" style="background:#455a64"></div> Hardware</div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script>
    // ---- Load Company Data from JSON ----
    fetch('companies.json')
      .then(res => res.json())
      .then(companies => { initMap(companies); })
      .catch(err => { console.error('Failed to load companies:', err); });

    // ---- Category Colors for Markers ----
    const categoryColors = {
      fintech: '#1565c0',
      saas: '#2e7d32',
      consumer: '#c62828',
      ai: '#6a1b9a',
      'dev-tools': '#e65100',
      logistics: '#00695c',
      hr: '#f57f17',
      design: '#ad1457',
      data: '#283593',
      auto: '#00838f',
      health: '#1b5e20',
      security: '#37474f',
      commerce: '#bf360c',
      education: '#006064',
      'real-estate': '#4e342e',
      hardware: '#455a64'
    };

    const categoryLabels = {
      fintech: 'Fintech', saas: 'SaaS', consumer: 'Consumer', ai: 'AI',
      'dev-tools': 'Dev Tools', logistics: 'Logistics', hr: 'HR', design: 'Design',
      data: 'Data', auto: 'Auto', health: 'Health', security: 'Security',
      commerce: 'Commerce', education: 'Education', 'real-estate': 'Real Estate',
      hardware: 'Hardware'
    };

    function createIcon(category, logo) {
      const color = categoryColors[category] || '#ff6600';
      if (logo) {
        return L.divIcon({
          className: 'custom-marker',
          html: `<div style="
            width: 28px; height: 28px;
            background: #fff;
            border: 2px solid rgba(255,255,255,0.95);
            border-radius: 5px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.4);
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
          "><img src="${logo}" style="width:22px; height:22px; object-fit:contain;" onerror="this.parentElement.style.background='${color}'; this.remove();"></div>`,
          iconSize: [28, 28],
          iconAnchor: [14, 14],
          popupAnchor: [0, -16]
        });
      }
      return L.divIcon({
        className: 'custom-marker',
        html: `<div style="
          width: 22px; height: 22px;
          background: ${color};
          border: 2px solid rgba(255,255,255,0.9);
          border-radius: 3px;
          box-shadow: 0 1px 4px rgba(0,0,0,0.4);
        "></div>`,
        iconSize: [22, 22],
        iconAnchor: [11, 11],
        popupAnchor: [0, -14]
      });
    }

    // ---- Initialize Map ----
    const map = L.map('map', {
      minZoom: 9,
      maxZoom: 18,
      maxBounds: [[36.8, -123.0], [38.2, -121.0]],
      maxBoundsViscosity: 1.0
    }).setView([37.55, -122.15], 10);

    // Stamen Watercolor tiles (via Cooper Hewitt / Smithsonian)
    L.tileLayer('https://watercolormaps.collection.cooperhewitt.org/tile/watercolor/{z}/{x}/{y}.jpg', {
      attribution: 'Map tiles by <a href="https://stamen.com/">Stamen Design</a>, under <a href="https://creativecommons.org/licenses/by/3.0">CC BY 3.0</a>. Data by <a href="https://openstreetmap.org">OpenStreetMap</a>, under ODbL.',
      maxZoom: 18
    }).addTo(map);


    const markerClusterGroup = L.markerClusterGroup({
      maxClusterRadius: 35,
      spiderfyOnMaxZoom: true,
      showCoverageOnHover: false
    });

    function initMap(companies) {
    // ---- Create Markers ----
    const markers = [];

    companies.forEach((company, index) => {
      const marker = L.marker([company.lat, company.lng], {
        icon: createIcon(company.category, company.logo)
      });

      const catLabel = categoryLabels[company.category] || company.category;
      const catColor = categoryColors[company.category] || '#ff6600';
      const logoHtml = company.logo ? `<img src="${company.logo}" style="width:24px; height:24px; object-fit:contain; border-radius:4px; flex-shrink:0;" onerror="this.remove();">` : '';

      marker.bindPopup(`
        <div style="min-width: 220px; font-family: -apple-system, sans-serif;">
          <div style="display:flex; align-items:center; gap:8px; margin-bottom:6px;">
            ${logoHtml}
            <strong style="font-size: 15px;">${company.name}</strong>
            <span style="font-size:10px; padding:2px 7px; border-radius:4px; background:${catColor}15; color:${catColor}; font-weight:600;">${catLabel}</span>
          </div>
          <p style="margin: 0 0 6px; font-size: 13px; color: #555; line-height:1.4;">${company.description}</p>
          <p style="font-size: 12px; color: #999; margin:0 0 6px;">${company.address}</p>
          ${company.website ? `<a href="${company.website}" target="_blank" style="font-size:12px; color:#ff6600; text-decoration:none;">Visit website &rarr;</a>` : ''}
        </div>
      `);

      marker.companyIndex = index;
      markers.push(marker);
      markerClusterGroup.addLayer(marker);
    });

    map.addLayer(markerClusterGroup);

    // ---- Sidebar List ----
    const companyList = document.getElementById('company-list');
    const companyCount = document.getElementById('company-count');
    const searchInput = document.getElementById('search-input');

    let activeCategory = 'all';
    let activeItem = null;

    function renderList(filtered) {
      companyList.innerHTML = '';
      companyCount.textContent = `${filtered.length} companies`;

      filtered.forEach(({ company, index }) => {
        const catLabel = categoryLabels[company.category] || company.category;
        const item = document.createElement('div');
        item.className = 'company-item';
        item.dataset.index = index;
        const sidebarLogo = company.logo ? `<img src="${company.logo}" style="width:18px; height:18px; object-fit:contain; border-radius:3px; flex-shrink:0;" onerror="this.remove();">` : '';
        item.innerHTML = `
          <div class="company-name">
            ${sidebarLogo}
            ${company.name}
            <span class="company-batch cat-${company.category}">${catLabel}</span>
          </div>
          <div class="company-desc">${company.description}</div>
          <div class="company-address">${company.address}</div>
        `;

        item.addEventListener('click', () => {
          if (activeItem) activeItem.classList.remove('active');
          item.classList.add('active');
          activeItem = item;

          map.setView([company.lat, company.lng], 16);
          markers[index].openPopup();
        });

        companyList.appendChild(item);
      });
    }

    function filterCompanies() {
      const query = searchInput.value.toLowerCase().trim();
      const filtered = companies
        .map((company, index) => ({ company, index }))
        .filter(({ company }) => {
          const matchCategory = activeCategory === 'all' || company.category === activeCategory;
          const matchSearch = !query ||
            company.name.toLowerCase().includes(query) ||
            company.description.toLowerCase().includes(query) ||
            company.category.toLowerCase().includes(query) ||
            company.address.toLowerCase().includes(query);
          return matchCategory && matchSearch;
        });

      renderList(filtered);

      // Update markers visibility
      markerClusterGroup.clearLayers();
      filtered.forEach(({ index }) => {
        markerClusterGroup.addLayer(markers[index]);
      });
    }

    // ---- Search ----
    searchInput.addEventListener('input', filterCompanies);

    // ---- Category Filter ----
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelector('.filter-btn.active').classList.remove('active');
        btn.classList.add('active');
        activeCategory = btn.dataset.category;
        filterCompanies();
      });
    });

    // ---- Initial Render ----
    filterCompanies();
    } // end initMap
  </script>
</body>
</html>
